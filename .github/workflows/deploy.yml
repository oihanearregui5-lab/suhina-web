name: Deploy suhina.es (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instalar dependencias
        run: bun install --frozen-lockfile

      - name: Compilar
        run: bun run build

      - name: Generar index.html estático (prerender)
        run: bun prerender.mjs

      - name: Añadir .htaccess al build
        run: cp deploy/.htaccess dist/client/.htaccess

      - name: Subir por FTP a /www
        uses: sebastianpopp/ftp-action@releases/v2
        with:
          host: ${{ secrets.FTP_HOST }}
          user: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          localDir: "dist/client"
          remoteDir: "www"
